<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gift for Muteee 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: #0a192f; /* Deep Navy Blue */
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Mencegah scroll aneh */
            position: relative;
            color: white;
            padding: 10px; /* Padding biar nggak nempel pinggir layar */
        }

        /* Dekorasi Bintang & Bulan */
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)); background-repeat: repeat; background-size: 200px 200px; opacity: 0.3; }
        .moon { position: absolute; top: 30px; right: 30px; width: 50px; height: 50px; background: #FFD700; border-radius: 50%; box-shadow: 0 0 20px #FFD700; opacity: 0.8; }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 25px 20px;
            border-radius: 25px;
            border: 2px solid #d4af37; /* Gold Border */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 320px;
            text-align: center;
            z-index: 10;
        }

        /* REM UNTUK VIDEO: Kita batasi tinggi maksimalnya agar tidak kepanjangan */
        video.display-vid { 
            width: 100%; 
            max-height: 200px; /* Video nggak boleh lebih dari 200px tinggi */
            border-radius: 15px; 
            border: 2px solid #d4af37; 
            margin-bottom: 20px;
            object-fit: cover; /* Biar videonya terpotong rapi di dalam kotak */
            display: block;
            background: #000;
        }

        h1 { font-family: 'Pacifico', cursive; color: #d4af37; font-size: 1.7rem; margin-bottom: 8px; }
        p#msg { font-size: 0.9rem; line-height: 1.4; margin-bottom: 20px; color: rgba(255,255,255,0.8); }

        /* Tombol Jawaban - Langsung muncul Flex */
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn-ans { background: white; color: #0a192f; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.9rem; width: 100%; transition: 0.3s; }
        .btn-ans:active { background: #f0f0f0; transform: scale(0.98); }

        /* Sembunyikan tombol "Open My Gift" yang lama */
        #btnMain, #status { display: none; }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="moon"></div>

    <audio id="lagu" loop>
        <source src="eid1.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <video id="eidVideo" class="display-vid" autoplay muted loop playsinline>
            <source id="vidSource" src="eidcat1.mp4" type="video/mp4">
        </video>
        
        <h1 id="judul">To: Muteee 🤍</h1>
        <p id="msg">hadiah kecil dari aku yang kangen.<br>mohon maaf lahir batin</p>
        
        <div class="btn-group" id="jawaban">
            <button class="btn-ans" onclick="jawab('maaf')">maaf diterima</button>
            <button class="btn-ans" onclick="jawab('thr')">bagi THR dulu dong</button>
            <button class="btn-ans" onclick="jawab('kangen')">aku nggak kangen</button>
        </div>
    </div>

    <script>
        var audio = document.getElementById("lagu");
        var video = document.getElementById("eidVideo");
        var source = document.getElementById("vidSource");

        // Trik Cache Video: Kita pre-load GIF/Video agar tidak delay pas diganti
        // Kalau kamu sudah upload file sendiri, ganti link-link ini jadi file kamu.
        const vidMaaf = "eidcat1.mp4"; // Tetep kucing
        const vidThr = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B4eXo5NmcyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif"; // Homer Makan (Tes)
        const vidKangen = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B4eXo5NmcyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/OPU6wUKARAOztu6S2K/giphy.gif"; // Sedih (Tes)

        // Kita pancing browser buat pre-load videonya
        new Image().src = vidThr;
        new Image().src = vidKangen;

        function jawab(tipe) {
            // Mainkan musik pas klik pertama
            if(audio.paused) { audio.play(); }

            let p = document.getElementById("msg");
            let j = document.getElementById("judul");

            if(tipe === 'maaf') {
                j.innerText = "Alhamdulillaaahhh 🤗";
                p.innerHTML = "Maaci ya udah dimaafin!<br>Kamu emang yang terbaik.";
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                source.src = vidMaaf; // Tetep kucing
            } 
            else if(tipe === 'thr') {
                j.innerText = "Mie Ayam, mau? 🍜";
                p.innerHTML = "Ayok aku traktir mie ayam sepuasnya<br>sampai kenyang!";
                source.src = vidThr; // Ganti ke GIF/Video makan
            } 
            else if(tipe === 'kangen') {
                j.innerText = "Yaudah iya.. 🥺";
                p.innerHTML = "Meskipun kamu nggak kangen,<br>aku tetep kangen kok!";
                source.src = vidKangen; // Ganti ke GIF sedih
            }
            
            video.load(); // Refresh video source
            video.play();
        }

        // Antisipasi kebijakan browser: klik di mana saja untuk play audio
        window.onclick = function() { 
            if (audio.paused) audio.play(); 
        };
    </script>
</body>
</html>
