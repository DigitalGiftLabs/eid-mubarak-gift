<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gift for Mutee 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: #0a192f; 
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: white;
            padding: 10px;
        }

        /* Langit Malam */
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)); background-repeat: repeat; background-size: 200px 200px; opacity: 0.4; }
        .moon { position: absolute; top: 30px; right: 30px; width: 45px; height: 45px; background: #FFD700; border-radius: 50%; box-shadow: 0 0 25px #FFD700; opacity: 0.9; }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 25px 20px;
            border-radius: 25px;
            border: 2px solid #d4af37;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 330px;
            text-align: center;
            z-index: 10;
        }

        video.display-vid, img.display-gif { 
            width: 100%; 
            height: 190px; 
            border-radius: 18px; 
            border: 2px solid #d4af37; 
            margin-bottom: 20px;
            object-fit: cover;
            display: block;
            background: #000;
        }

        /* Font Patrick Hand SC untuk Judul & Pesan */
        h1 { font-family: 'Patrick Hand SC', cursive; color: #d4af37; font-size: 2.5rem; margin-bottom: 5px; letter-spacing: 1px; }
        p#msg { font-family: 'Patrick Hand SC', cursive; font-size: 1.3rem; line-height: 1.2; margin-bottom: 25px; color: rgba(255,255,255,0.9); height: 3.5em; display: flex; align-items: center; justify-content: center; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        
        /* Tombol Emas Berdenyut */
        .btn-ans { 
            background: rgba(255, 255, 255, 0.95); 
            color: #0a192f; 
            border: 2px solid #d4af37;
            padding: 12px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-family: 'Quicksand', sans-serif;
            font-weight: bold; 
            font-size: 1rem; 
            width: 100%; 
            transition: all 0.3s ease; 
            animation: goldPulse 2s infinite ease-out;
        }

        @keyframes goldPulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .btn-ans:active { transform: scale(0.95); animation: none; }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="moon"></div>

    <audio id="lagu" loop>
        <source src="eid1.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <img id="mediaDisplay" class="display-gif" style="display:none;">
        <video id="eidVideo" class="display-vid" autoplay muted loop playsinline>
            <source id="vidSource" src="eidcat1.mp4" type="video/mp4">
        </video>
        
        <h1 id="judul">To: Mutee 🤍</h1>
        <p id="msg">hadiah kecil dari aku yang kangen.<br>mohon maaf lahir batin</p>
        
        <div class="btn-group">
            <button class="btn-ans" onclick="jawab('maaf')">maaf diterima</button>
            <button class="btn-ans" onclick="jawab('thr')">bagi THR dulu dong</button>
            <button class="btn-ans" onclick="jawab('kangen')">aku nggak kangen</button>
        </div>
    </div>

    <script>
        var audio = document.getElementById("lagu");
        var video = document.getElementById("eidVideo");
        var img = document.getElementById("mediaDisplay");

        function jawab(tipe) {
            if(audio.paused) { audio.play(); }

            let p = document.getElementById("msg");
            let j = document.getElementById("judul");

            video.style.display = "none";
            img.style.display = "block";

            if(tipe === 'maaf') {
                j.innerText = "Alhamdulillah 🤗";
                p.innerHTML = "makasi tsay!<br>u emang yang terbaik.";
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                img.src = "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExdWp0dWkyZGhob2F4dDlzd2J4MnYwNnF4aTdyYnF5YjlibnptcGQwOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/96suQaNpBRyE/giphy.gif";
            } 
            else if(tipe === 'thr') {
                j.innerText = "Mie ayam, mau? 🍜";
                p.innerHTML = "ayok w traktir mie ayam sepuasnya<br>sampe perut u meledug!";
                img.src = "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExcGVuZW1wejY5YzFlZ3F6ZHFrbjYxdTI4ODg1aGNha3U1YmFidHZ2NSZlcD12MV9naWZzX3NlYXJjaCZjdD1z/A5iIn3QcbTYN7ylM3e/giphy.gif";
            } 
            else if(tipe === 'kangen') {
                j.innerText = "yaudah iya.. 🥺";
                p.innerHTML = "meskipun u nggak kangen,<br>w tetep kangen kok!";
                img.src = "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExYmpuc2ZyZjJhNDZpMzh1eWhlY25kdG50YWV5bzJjZzVkeWh6NnNsdSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/4uVyQiFGLicuI/giphy.gif";
            }
        }

        window.onclick = function() { if (audio.paused) audio.play(); };
    </script>
</body>
</html>
