<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift for Annisa</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #f8f9f5; font-family: sans-serif; text-align: center; padding: 50px 20px; color: #2d5a27; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: inline-block; max-width: 320px; width: 100%; }
        img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .btn { background: #2d5a27; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }
    </style>
</head>
<body>

    <audio id="lagu" loop>
        <source src="https://cdn.pixabay.com/audio/2024/02/14/audio_1416e994bc.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B4eXo5NmcyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif">
        <h2 id="judul">To: Annisa ❤️</h2>
        <p id="pesan">Klik tombol di bawah ya!</p>
        <button class="btn" id="tombol" onclick="gas()">Open My Gift ✨</button>
    </div>

    <script>
        function gas() {
            // 1. Ganti tulisan dulu (Biar user tau tombol sudah bekerja)
            document.getElementById("judul").innerHTML = "Mohon Maaf Lahir & Batin!";
            document.getElementById("pesan").innerHTML = "Enjoy the music! 🎶✨";
            document.getElementById("tombol").style.display = "none";

            // 2. Kembang api
            confetti();

            // 3. Putar Musik dengan "Try-Catch" agar tidak merusak kodingan lain
            var audio = document.getElementById("lagu");
            audio.play().catch(function(error) {
                console.log("Musik tertahan browser, klik layar lagi ya!");
                // Kalau gagal, kita minta user klik layar sekali lagi
                alert("Klik OK untuk memutar musiknya!");
                audio.play();
            });
        }
    </script>
</body>
</html>
