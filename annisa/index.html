<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift for Annisa</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #f8f9f5; font-family: sans-serif; text-align: center; padding-top: 50px; color: #2d5a27; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: inline-block; max-width: 300px; }
        img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .btn { background: #2d5a27; color: white; border: none; padding: 15px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <audio id="lagu" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B4eXo5NmcyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif">
        <h2 id="judul">To: Annisa ❤️</h2>
        <p id="pesan">Klik tombol di bawah ya!</p>
        <button class="btn" id="tombol" onclick="gas()">Open My Gift ✨</button>
    </div>

    <script>
        function gas() {
            // 1. Kembang api
            confetti();

            // 2. Putar Musik (Paling Penting)
            var audio = document.getElementById("lagu");
            audio.play();

            // 3. Ganti Tulisan
            document.getElementById("judul").innerHTML = "Mohon Maaf Lahir & Batin!";
            document.getElementById("pesan").innerHTML = "Enjoy the music! 🎶";
            document.getElementById("tombol").style.display = "none";
        }
    </script>
</body>
</html>
