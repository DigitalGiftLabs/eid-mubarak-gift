<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak from Meowminder! 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0a192f; font-family: 'Quicksand', sans-serif;
            height: 100vh; width: 100vw; display: flex; justify-content: center; 
            align-items: center; overflow: hidden; position: relative; color: white; padding: 10px;
        }
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)); background-repeat: repeat; background-size: 200px 200px; opacity: 0.4; }
        .moon { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: #FFD700; border-radius: 50%; box-shadow: 0 0 20px #FFD700; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 25px; border: 2px solid #d4af37;
            width: 100%; max-width: 340px; text-align: center; z-index: 10;
        }

        /* MEDIA SKALA 1:1 */
        .display-media { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* SKALA 1:1 KOTAK PRESISI */
            border-radius: 15px; border: 2px solid #d4af37; 
            margin-bottom: 15px; object-fit: cover; background: #000; display: none;
        }

        h1 { font-family: 'Patrick Hand SC', cursive; color: #d4af37; font-size: 2rem; margin-bottom: 10px; text-transform: none !important; }
        p#msg { font-size: 0.9rem; line-height: 1.4; margin-bottom: 20px; min-height: 3em; text-transform: none !important; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        
        .btn-ans { 
            background: white; color: #0a192f; border: 2px solid #d4af37;
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; 
            font-size: 0.9rem; text-transform: none; transition: all 0.2s ease;
        }
        .btn-ans:active { transform: scale(0.9); background: #d4af37 !important; color: white !important; }
        
        #btnBack {
            display: none; background: rgba(212, 175, 55, 0.2); color: #d4af37; 
            border: 1px solid #d4af37; padding: 10px; margin-top: 10px; border-radius: 10px;
            font-size: 0.8rem; width: 100%; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="moon"></div>
    <audio id="lagu" loop><source src="../annisa/eid1.mp3" type="audio/mpeg"></audio>

    <div class="card">
        <img id="imgDisplay" class="display-media" src="muslimcat.jpeg" style="display:block;">
        <video id="vidDisplay" class="display-media" autoplay muted loop playsinline></video>
        
        <h1 id="judul">Eid Mubarak! ✨</h1>
        <p id="msg">A special gift from Meowminder.<br><b>Taqabbalallahu Minna wa Minkum</b><br><small>May Allah accept our good deeds</small></p>
        
        <div id="groupTombol" class="btn-group">
            <button class="btn-ans" onclick="jawab('wish')">Make a Wish</button>
            <button class="btn-ans" onclick="jawab('treats')">Send Meow Treats 🐟</button>
            <button class="btn-ans" onclick="jawab('hug')">Virtual Hug</button>
        </div>
        <button id="btnBack" onclick="resetPage()">← Back to Start</button>
    </div>

    <script>
        const audio = document.getElementById("lagu");
        const img = document.getElementById("imgDisplay");
        const vid = document.getElementById("vidDisplay");
        const btnBack = document.getElementById("btnBack");
        const groupTombol = document.getElementById("groupTombol");
        const p = document.getElementById("msg");
        const j = document.getElementById("judul");

        function showMedia(type, source) {
            if(type === 'img') {
                vid.style.display = "none";
                img.style.display = "block";
                img.src = source;
            } else {
                img.style.display = "none";
                vid.style.display = "block";
                vid.src = source;
                vid.play();
            }
        }

        function jawab(tipe) {
            if(audio.paused) audio.play();
            groupTombol.style.display = "none"; 
            btnBack.style.display = "block"; 

            if(tipe === 'wish') {
                j.innerText = "Ameen Ya Rabb! 🤲";
                p.innerHTML = "<b>May Allah accept your fasts and prayers.</b><br>May His light guide your path<br>and fill your heart with peace.";
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                showMedia('img', 'amiin.jpeg');
            } 
            else if(tipe === 'treats') {
                j.innerText = "Barakallah! 🐟";
                p.innerHTML = "<b>Jazakallahu Khairan!</b><br>Meow is very happy with the treats.<br><small>May your kindness be rewarded by Allah.</small>";
                showMedia('vid', 'fish.mp4');
            }
            else if(tipe === 'hug') {
                j.innerText = "Warm Eid Hugs 🤗";
                p.innerHTML = "Sending you a warm hug and many prayers:<br><b>May your heart always be at peace with Allah's love.</b><br>";
                showMedia('vid', 'virtualhug.mp4');
            }
        }

        function resetPage() {
    j.innerText = "Eid Mubarak! ✨";
    p.innerHTML = "A special gift from Meowminder.<br><b>Taqabbalallahu Minna wa Minkum</b><br><small>May Allah accept our good deeds</small>";
    showMedia('img', 'muslimcat.jpeg');
    btnBack.style.display = "none";
    groupTombol.style.display = "flex";
}
    </script>
</body>
</html>
