<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak from Meowminder! 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: #0a192f; 
            font-family: 'Quicksand', sans-serif;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative; color: white; padding: 10px;
        }

        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)); background-repeat: repeat; background-size: 200px 200px; opacity: 0.4; }
        .moon { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: #FFD700; border-radius: 50%; box-shadow: 0 0 20px #FFD700; }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 20px; border-radius: 25px;
            border: 2px solid #d4af37;
            width: 100%; max-width: 330px;
            text-align: center; z-index: 10;
        }

        .display-media { 
            width: 100%; height: 180px; 
            border-radius: 15px; border: 2px solid #d4af37; 
            margin-bottom: 15px; object-fit: cover; background: #000;
        }

        h1 { 
            font-family: 'Patrick Hand SC', cursive; 
            color: #d4af37; font-size: 2.2rem; 
            margin-bottom: 10px; text-transform: none !important; 
        }
        
        p#msg { 
            font-family: 'Quicksand', sans-serif; 
            font-size: 0.95rem; line-height: 1.4; 
            margin-bottom: 20px; min-height: 3em;
            text-transform: none !important;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        
        .btn-ans { 
            background: white; color: #0a192f; 
            border: 2px solid #d4af37;
            padding: 12px; border-radius: 12px; 
            cursor: pointer; font-weight: bold; 
            font-size: 0.9rem; text-transform: none;
            position: relative; overflow: hidden;
            transition: all 0.2s ease;
            animation: goldPulse 2s infinite;
        }

        .btn-ans:active { 
            transform: scale(0.9); 
            background: #d4af37 !important; color: white !important;
        }

        #btnBack {
            display: none; background: rgba(212, 175, 55, 0.2);
            color: #d4af37; border: 1px solid #d4af37;
            padding: 10px; margin-top: 10px; border-radius: 10px;
            font-size: 0.8rem; width: 100%; font-weight: bold;
        }

        @keyframes goldPulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="moon"></div>

    <audio id="lagu" loop>
        <source src="../annisa/eid1.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <img id="imgDisplay" class="display-media" style="display:none;">
        <video id="eidVideo" class="display-media" autoplay muted loop playsinline>
            <source src="../annisa/eidcat1.mp4" type="video/mp4">
        </video>
        
        <h1 id="judul">Eid Mubarak! ✨</h1>
        <p id="msg">A special gift from Meowminder.<br>May your day be filled with joy!</p>
        
        <div id="groupTombol" class="btn-group">
            <button class="btn-ans" onclick="jawab('wish')">Make a Wish</button>
            <button class="btn-ans" onclick="jawab('treats')">Send Cat Treats 🐟</button>
            <button class="btn-ans" onclick="jawab('hug')">Virtual Hug</button>
        </div>

        <button id="btnBack" onclick="resetPage()">← Back to Start</button>
    </div>

    <script>
        var audio = document.getElementById("lagu");
        var video = document.getElementById("eidVideo");
        var img = document.getElementById("imgDisplay");
        var btnBack = document.getElementById("btnBack");
        var groupTombol = document.getElementById("groupTombol");

        function jawab(tipe) {
            if(audio.paused) audio.play();
            video.style.display = "none";
            img.style.display = "block";
            groupTombol.style.display = "none"; 
            btnBack.style.display = "block"; 

            let p = document.getElementById("msg");
            let j = document.getElementById("judul");

            if(tipe === 'wish') {
                j.innerText = "Ameen! 🤲";
                p.innerHTML = "May all your prayers be answered<br>and your heart be at peace.";
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                img.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B4eXo5NmcyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/OPU6wUKARAOztu6S2K/giphy.gif";
            } 
            else if(tipe === 'treats') {
                j.innerText = "Yummy! 🐟";
                p.innerHTML = "The cats are very happy!<br>Thank you for the treats, hooman.";
                img.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B4eXo5NmcyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif";
            } 
            else if(tipe === 'hug') {
                j.innerText = "Warm Hugs 🤗";
                p.innerHTML = "Sending you lots of love<br>and fluffy purrs today!";
                img.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B4eXo5NmcyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/96suQaNpBRyE/giphy.gif";
            }
        }

        function resetPage() {
            document.getElementById("judul").innerText = "Eid Mubarak! ✨";
            document.getElementById("msg").innerHTML = "A special gift from Meowminder.<br>May your day be filled with joy!";
            img.style.display = "none";
            video.style.display = "block";
            btnBack.style.display = "none";
            groupTombol.style.display = "flex";
        }
    </script>
</body>
</html>
